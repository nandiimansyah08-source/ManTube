<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}
body{
  min-height:100vh;
  background:linear-gradient(-45deg,#050816,#091227,#0b1f3a,#04111f);
  background-size:400% 400%;
  animation:bg 10s ease infinite;
  color:white;
  overflow:hidden;
}
@keyframes bg{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* BOTTOM NAVIGATION */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.1);
  padding:15px 20px;
  display:flex;
  justify-content:space-around;
  z-index:1000;
}
.nav-btn{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5px;
  padding:10px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  cursor:pointer;
  transition:0.3s;
  border:none;
  color:#ccc;
  font-size:12px;
}
.nav-btn:hover,
.nav-btn.active{
  background:#1db954;
  color:white;
  transform:scale(1.05);
}
.nav-icon{
  font-size:22px;
}

/* MAIN CONTENT */
.main{
  height:100vh;
  padding:20px;
  padding-bottom:100px;
  overflow-y:auto;
  position:relative;
}
.content-area{
  min-height:100%;
}

/* SEARCH */
.search-box{
  max-width:400px;
  margin:20px 0 30px;
}
.search-box input{
  width:100%;
  padding:15px 25px;
  border:none;
  outline:none;
  border-radius:50px;
  background:rgba(255,255,255,0.1);
  color:white;
  font-size:15px;
  backdrop-filter:blur(10px);
}
.search-box input::placeholder{
  color:#bbb;
}

/* SONG LIST */
.song-list{
  display:flex;
  flex-direction:column;
  gap:15px;
}
.song{
  display:flex;
  align-items:center;
  gap:15px;
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:20px;
  transition:0.3s;
  cursor:pointer;
  backdrop-filter:blur(10px);
}
.song:hover{
  background:rgba(29,185,84,0.2);
  transform:translateX(10px);
}
.song-cover{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:15px;
  flex-shrink:0;
}
.song-info h4{
  font-size:18px;
  margin-bottom:5px;
}
.song-info small{
  color:#ccc;
  font-size:14px;
}
.song-actions{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:15px;
}
.fav-btn{
  font-size:24px;
  cursor:pointer;
  transition:0.3s;
  padding:8px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
}
.fav-btn:hover{
  transform:scale(1.2);
  background:rgba(255,255,255,0.2);
}
.fav-btn.active{
  background:#1db954;
  color:white;
}
.play-icon{
  width:45px;
  height:45px;
  border-radius:50%;
  background:#1db954;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  color:black;
}

/* EMPTY STATE */
.empty-state{
  text-align:center;
  padding:80px 30px;
  color:#888;
}
.empty-icon{
  font-size:100px;
  margin-bottom:25px;
  opacity:0.4;
}
.empty-title{
  font-size:28px;
  margin-bottom:15px;
}
.empty-text{
  font-size:16px;
  max-width:400px;
  margin:0 auto;
  line-height:1.6;
}

/* ARTIST PROFILES - MANUAL EDITABLE */
.artist-section{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
  gap:25px;
  margin-top:30px;
}
.artist-card{
  background:rgba(255,255,255,0.08);
  border-radius:25px;
  padding:30px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.1);
}
.artist-card:hover{
  transform:translateY(-10px);
  background:rgba(29,185,84,0.15);
  border-color:#1db954;
}
.artist-card-cover{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  margin:0 auto 20px;
  border:3px solid rgba(29,185,84,0.5);
}
.artist-card-name{
  font-size:24px;
  font-weight:bold;
  margin-bottom:10px;
}
.artist-card-stats{
  display:flex;
  justify-content:center;
  gap:20px;
  font-size:14px;
  color:#bbb;
}
.artist-stat{
  text-align:center;
}
.artist-stat-number{
  color:#1db954;
  font-weight:bold;
  font-size:18px;
  display:block;
}

/* NOW PLAYING SCREEN */
.now-playing{
  height:100vh;
  padding:30px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  overflow:hidden;
}
.song-hero{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:30px;
}
.song-cover-large{
  width:300px;
  height:300px;
  object-fit:cover;
  border-radius:25px;
  box-shadow:0 20px 60px rgba(29,185,84,0.3);
  border:3px solid rgba(29,185,84,0.5);
}
.song-title{
  font-size:36px;
  font-weight:bold;
  margin-bottom:10px;
  background:linear-gradient(45deg, white, #1db954);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.song-artist{
  font-size:20px;
  color:#ccc;
  margin-bottom:40px;
}

/* PLAYER CONTROLS */
.player-controls{
  background:rgba(255,255,255,0.08);
  border-radius:25px;
  padding:30px;
  backdrop-filter:blur(20px);
  width:100%;
  max-width:600px;
}
#nowPlayingInfo{
  text-align:center;
  margin-bottom:25px;
  color:#ddd;
}
audio{
  width:100%;
  margin-bottom:30px;
  border-radius:20px;
}

/* LYRICS */
.lyrics-container{
  max-height:300px;
  overflow-y:auto;
  scroll-behavior:smooth;
}
.lyrics-container::-webkit-scrollbar{
  width:4px;
}
.lyrics-container::-webkit-scrollbar-thumb{
  background:#1db954;
}
.lyrics{
  font-size:26px;
  line-height:2.6;
  text-align:center;
  font-weight:500;
  color:#888;
}
.lyrics span{
  display:block;
  padding:12px 20px;
  transition:0.4s;
  border-radius:15px;
}
.lyrics span.active{
  color:white !important;
  transform:scale(1.05);
  margin:0 20px;
}

/* RESPONSIVE */
@media(max-width:768px){
  .main{
    padding:15px;
    padding-bottom:90px;
  }
  .song{
    padding:15px;
    gap:12px;
  }
  .song-cover{
    width:60px;
    height:60px;
  }
  .song-hero{
    padding:0 20px;
  }
  .song-cover-large{
    width:250px;
    height:250px;
  }
  .song-title{
    font-size:28px;
  }
  .artist-section{
    grid-template-columns:1fr;
  }
  .nav-btn{
    padding:8px;
    min-width:70px;
    font-size:11px;
  }
}
</style>

  document.querySelectorAll('.content-area').forEach(area => area.style.display = 'none');

  else if(section === 'artist') showArtists();

      <div class="play-icon">▶</div>
    </div>
  `;

  div.onclick = (e) => {
    if(e.target.classList.contains('fav-btn')) return;
    playSongFullScreen(index);
  };

  return div;
}

function toggleFavorite(event, title) {
  event.stopPropagation();
  if(favorites.includes(title)) {
    favorites = favorites.filter(f => f !== title);
  } else {
    favorites.push(title);
  }
  refreshCurrentView();
}

function refreshCurrentView() {
  if(currentSection === 'home') showHome();
  else if(currentSection === 'songs') showAllSongs();
  else if(currentSection === 'favorites') showFavorites();
}

// BERANDA
function showHome() {
  const searchValue = document.getElementById("homeSearch").value.toLowerCase();
  const list = document.getElementById("homeList");
  list.innerHTML = "";
  
  if(searchValue) {
    const filtered = songs.filter(song =>
      song.title.toLowerCase().includes(searchValue) ||
      song.artist.toLowerCase().includes(searchValue)
    );
    filtered.forEach(song => {
      list.appendChild(createSongItem(song, songs.indexOf(song), true));
    });
  } else {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎵</div>
        <h3 class="empty-title">Selamat Datang</h3>
        <p class="empty-text">Jelajahi musik favoritmu.<br>Cari lagu atau buka menu Artis untuk profil lengkap.<br>Info donatur buat ngopi</p>
      </div>
    `;
  }
}

document.getElementById("homeSearch").addEventListener("input", showHome);

// SEMUA LAGU
function showAllSongs() {
  const list = document.getElementById("songsList");
  list.innerHTML = "";
  songs.forEach((song, index) => {
    list.appendChild(createSongItem(song, index, true));
  });
}

// ARTIS PROFILES - MANUAL EDITABLE
function showArtists() {
  const container = document.getElementById("artistProfiles");
  container.innerHTML = "";
  
  artists.forEach(artist => {
    const artistCard = document.createElement("div");
    artistCard.className = "artist-card";
    artistCard.onclick = () => showArtistSongs(artist);
    
    artistCard.innerHTML = `
      <img src="${artist.cover}" class="artist-card-cover" alt="${artist.name}">
      <div class="artist-card-name">${artist.name}</div>
      <div class="artist-card-stats">
      </div>
    `;
    
    container.appendChild(artistCard);
  });
}

function showArtistSongs(artist) {
  const list = document.getElementById("songsList");
  document.getElementById("artistContent").style.display = 'none';
  document.getElementById("songsContent").style.display = 'block';
  document.getElementById('songsBtn').click(); // Update nav
  
  list.innerHTML = `<div style="margin-bottom:30px;">
    <h2 style="font-size:28px;margin-bottom:15px;">${artist.name}</h2>
    <p style="color:#bbb;">${artist.songs} lagu • ${artist.listeners} pendengar</p>
  </div>`;
  
  const artistSongs = songs.filter(s => s.artist === artist.name);
  artistSongs.forEach(song => {
    const index = songs.indexOf(song);
    list.appendChild(createSongItem(song, index, true)); // Favorite enabled
  });
}

// FAVORITES
function showFavorites() {
  const list = document.getElementById("favoritesList");
  list.innerHTML = "";
  const favSongs = songs.filter(s => favorites.includes(s.title));
  
  if(favSongs.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">💚</div>
        <h3 class="empty-title">Belum ada favorit</h3>
        <p class="empty-text">Tekan ikon hati 🤍 di Beranda, Lagu, atau Artis untuk menambah favorit.</p>
      </div>
    `;
  } else {
    favSongs.forEach(song => {
      const index = songs.indexOf(song);
      list.appendChild(createSongItem(song, index, false)); // No duplicate fav button
    });
  }
}

// FULL SCREEN PLAYER
function playSongFullScreen(index) {
  currentIndex = index;
  const song = songs[index];
  
  document.querySelectorAll('.content-area').forEach(area => area.style.display = 'none');
  document.getElementById('nowPlayingScreen').style.display = 'flex';
  
  document.getElementById('nowCover').src = song.cover;
  document.getElementById('nowTitle').textContent = song.title;
  document.getElementById('nowArtist').textContent = song.artist;
  document.getElementById('nowPlayingInfo').textContent = `Sedang diputar • ${song.artist}`;
  
  player.src = song.file;
  player.play();
  
  if(song.lyrics) {
    currentLyrics = song.lyrics;
    displayLyrics(currentLyrics);
  } else {
    lyricsContainer.innerHTML = '<span style="color:#666; font-size:20px;">Lirik belum tersedia</span>';
  }
}

function displayLyrics(lyrics) {
  lyricsContainer.innerHTML = "";
  lyricSpans = [];
  lyrics.forEach((lyric) => {
    const span = document.createElement("span");
    span.textContent = lyric.text;
    lyricsContainer.appendChild(span);
    lyricSpans.push(span);
  });
}

function updateActiveLyric() {
  if(!currentLyrics.length) return;
  const currentTime = player.currentTime;
  
  lyricSpans.forEach(span => span.classList.remove("active"));
  for(let i = 0; i < currentLyrics.length; i++) {
    const lyric = currentLyrics[i];
    const nextLyric = currentLyrics[i + 1];
    if(currentTime >= lyric.time && (!nextLyric || currentTime < nextLyric.time)) {
      if(lyricSpans[i]) {
        lyricSpans[i].classList.add("active");
        lyricSpans[i].scrollIntoView({behavior: "smooth", block: "center"});
      }
      break;
    }
  }
}

// EVENTS
player.addEventListener("timeupdate", updateActiveLyric);
player.addEventListener("ended", () => {
  let next = currentIndex + 1;
  if(next >= songs.length) next = 0;
  playSongFullScreen(next);
});

// INIT
showHome();
</script>
</body>
</html>
