<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouRoom Music</title>
<link href="https://fonts.googleapis.com/css2?family=Circular+Std:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1db954;
  --green-dim: #1aa34a;
  --bg: #0a0a0a;
  --surface: #121212;
  --surface2: #1a1a1a;
  --surface3: #242424;
  --surface4: #2a2a2a;
  --text: #ffffff;
  --text-dim: #b3b3b3;
  --text-muted: #535353;
  --radius: 8px;
  --player-h: 90px;
  --nav-h: 72px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* LAYOUT */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* MAIN SCROLL AREA */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  padding-bottom: calc(var(--player-h) + var(--nav-h) + 20px);
  scrollbar-width: thin;
  scrollbar-color: var(--surface4) transparent;
}

.scroll-area::-webkit-scrollbar { width: 6px; }
.scroll-area::-webkit-scrollbar-thumb { background: var(--surface4); border-radius: 3px; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--surface);
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  z-index: 100;
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: 10px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  cursor: pointer;
  transition: color 0.15s;
}

.nav-btn.active { color: var(--text); }

.nav-btn svg { width: 24px; height: 24px; }

/* MINI PLAYER */
.mini-player {
  position: fixed;
  bottom: var(--nav-h);
  left: 8px; right: 8px;
  height: var(--player-h);
  background: #282828;
  border-radius: 12px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 12px;
  z-index: 99;
  cursor: pointer;
  transition: opacity 0.2s;
  opacity: 0;
  pointer-events: none;
  overflow: hidden;
}

.mini-player.visible { opacity: 1; pointer-events: all; }

.mini-player::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--text-muted);
  border-radius: 1px;
}

.mini-progress {
  position: absolute;
  bottom: 0; left: 0;
  height: 2px;
  background: var(--green);
  border-radius: 1px;
  width: 0%;
  transition: width 0.5s linear;
}

.mini-cover {
  width: 56px; height: 56px;
  border-radius: 6px;
  object-fit: cover;
  flex-shrink: 0;
}

.mini-info { flex: 1; min-width: 0; }

.mini-title {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.mini-artist {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}

.mini-controls { display: flex; align-items: center; gap: 8px; }

.mini-btn {
  background: none;
  border: none;
  color: var(--text);
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
  display: flex;
  transition: background 0.15s;
}

.mini-btn:hover { background: rgba(255,255,255,0.1); }

.mini-btn.play-btn {
  background: var(--text);
  color: var(--bg);
  width: 36px; height: 36px;
  justify-content: center;
  align-items: center;
  padding: 0;
}

.mini-btn.play-btn:hover { background: #e0e0e0; transform: scale(1.05); }

/* PAGES */
.page { display: none; }
.page.active { display: block; }

/* HOME PAGE */
.home-header {
  padding: 60px 24px 24px;
  background: linear-gradient(180deg, #1a2a1a 0%, transparent 100%);
}

.home-greeting {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 4px;
}

.home-sub { font-size: 14px; color: var(--text-dim); }

.section-title {
  font-size: 22px;
  font-weight: 700;
  padding: 24px 24px 16px;
}

.quick-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 0 24px;
}

.quick-item {
  background: var(--surface3);
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: background 0.15s;
  height: 64px;
}

.quick-item:hover { background: var(--surface4); }

.quick-item img {
  width: 64px; height: 64px;
  object-fit: cover;
  flex-shrink: 0;
}

.quick-item-name {
  font-size: 13px;
  font-weight: 700;
  padding-right: 12px;
  line-height: 1.3;
}

/* SEARCH PAGE */
.search-header {
  padding: 60px 24px 16px;
}

.search-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 16px; }

.search-input-wrap {
  position: relative;
}

.search-input-wrap svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--bg);
  width: 18px; height: 18px;
}

#searchInput {
  width: 100%;
  padding: 14px 14px 14px 44px;
  border-radius: 6px;
  border: none;
  background: var(--text);
  color: var(--bg);
  font-size: 15px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  outline: none;
}

#searchInput::placeholder { color: #6a6a6a; }

.browse-title { font-size: 16px; font-weight: 700; padding: 24px 24px 16px; }

.browse-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 0 24px;
}

.browse-card {
  height: 100px;
  border-radius: 10px;
  cursor: pointer;
  overflow: hidden;
  position: relative;
  transition: transform 0.15s;
}

.browse-card:hover { transform: scale(0.98); }

.browse-card.songs { background: linear-gradient(135deg, #1db954, #0a7a33); }
.browse-card.artists { background: linear-gradient(135deg, #4a90e2, #1a3a6e); }

.browse-card-label {
  position: absolute;
  bottom: 14px; left: 16px;
  font-size: 16px;
  font-weight: 700;
}

.browse-card-icon {
  position: absolute;
  right: -8px; bottom: -8px;
  font-size: 64px;
  opacity: 0.4;
  transform: rotate(15deg);
}

/* SEARCH RESULTS */
.search-results { padding: 0 0 16px; }

.results-section { margin-bottom: 24px; }

.results-title {
  font-size: 18px;
  font-weight: 700;
  padding: 0 24px 12px;
}

/* COLLECTION PAGE */
.collection-header {
  padding: 60px 24px 24px;
}

.collection-header h1 { font-size: 28px; font-weight: 700; }

.filter-tabs {
  display: flex;
  gap: 8px;
  padding: 0 24px 20px;
  overflow-x: auto;
  scrollbar-width: none;
}

.filter-tabs::-webkit-scrollbar { display: none; }

.filter-tab {
  padding: 8px 16px;
  border-radius: 20px;
  border: none;
  background: var(--surface3);
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}

.filter-tab.active { background: var(--text); color: var(--bg); }

/* SONG LIST ITEMS */
.song-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 24px;
  cursor: pointer;
  transition: background 0.1s;
}

.song-item:hover { background: rgba(255,255,255,0.07); }
.song-item.playing { background: rgba(29,185,84,0.08); }

.song-item-num {
  width: 24px;
  text-align: right;
  font-size: 14px;
  color: var(--text-dim);
  flex-shrink: 0;
}

.song-item.playing .song-item-num { color: var(--green); }

.song-item-cover {
  width: 48px; height: 48px;
  border-radius: 4px;
  object-fit: cover;
  flex-shrink: 0;
}

.song-item-info { flex: 1; min-width: 0; }

.song-item-title {
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.song-item.playing .song-item-title { color: var(--green); }

.song-item-artist {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}

.song-item-fav {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 8px;
  font-size: 16px;
  transition: color 0.15s, transform 0.15s;
  flex-shrink: 0;
}

.song-item-fav.active { color: var(--green); }
.song-item-fav:hover { transform: scale(1.2); }

/* ARTIST CARDS - HORIZONTAL SCROLL */
.artists-scroll {
  display: flex;
  gap: 16px;
  padding: 0 24px;
  overflow-x: auto;
  scrollbar-width: none;
}

.artists-scroll::-webkit-scrollbar { display: none; }

.artist-chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  flex-shrink: 0;
  width: 90px;
  transition: transform 0.15s;
}

.artist-chip:hover { transform: scale(1.05); }

.artist-chip img {
  width: 90px; height: 90px;
  border-radius: 50%;
  object-fit: cover;
}

.artist-chip-name {
  font-size: 12px;
  font-weight: 600;
  text-align: center;
  line-height: 1.3;
}

/* FULL ARTIST PAGE */
.artist-page-header {
  position: relative;
  height: 280px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 24px;
}

.artist-page-header img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.artist-page-header::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 20%, rgba(0,0,0,0.8) 70%, var(--bg) 100%);
}

.artist-page-name {
  position: relative;
  z-index: 1;
  font-size: 42px;
  font-weight: 700;
  line-height: 1.1;
}

.artist-page-back {
  position: absolute;
  top: 50px; left: 16px;
  z-index: 2;
  background: rgba(0,0,0,0.5);
  border: none;
  color: white;
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(10px);
}

/* NOW PLAYING */
.now-playing-screen {
  position: fixed;
  inset: 0;
  z-index: 200;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
  overflow: hidden;
}

.now-playing-screen.open { transform: translateY(0); }

.np-bg {
  position: absolute;
  inset: 0;
  background: var(--bg);
  z-index: -1;
}

.np-bg-blur {
  position: absolute;
  inset: -20%;
  opacity: 0.3;
  filter: blur(60px);
  z-index: -1;
  background-size: cover;
  background-position: center;
  transition: background 1s;
}

.np-header {
  display: flex;
  align-items: center;
  padding: 56px 24px 16px;
  gap: 12px;
}

.np-down-btn {
  background: none;
  border: none;
  color: var(--text);
  cursor: pointer;
  padding: 8px;
  margin-right: auto;
  display: flex;
}

.np-context { font-size: 12px; color: var(--text-dim); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; flex: 1; text-align: center; }

.np-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 0 32px;
  overflow: hidden;
}

.np-cover-wrap {
  flex-shrink: 0;
  margin: 0 auto;
  width: 100%;
  max-width: 320px;
  aspect-ratio: 1;
  margin-bottom: 32px;
}

.np-cover {
  width: 100%;
  height: 100%;
  border-radius: 12px;
  object-fit: cover;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.np-cover.playing { transform: scale(1.0); }
.np-cover.paused { transform: scale(0.88); }

.np-info {
  display: flex;
  align-items: center;
  margin-bottom: 24px;
  gap: 12px;
}

.np-info-text { flex: 1; min-width: 0; }

.np-title {
  font-size: 22px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.np-artist { font-size: 15px; color: var(--text-dim); margin-top: 4px; }

.np-fav {
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  transition: transform 0.2s;
  padding: 8px;
}

.np-fav:hover { transform: scale(1.2); }

/* PROGRESS */
.np-progress-wrap {
  margin-bottom: 20px;
}

.np-progress-bar {
  height: 4px;
  background: var(--surface4);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
  margin-bottom: 8px;
}

.np-progress-fill {
  height: 100%;
  background: var(--text);
  border-radius: 2px;
  width: 0%;
  position: relative;
  transition: width 0.5s linear;
}

.np-progress-fill::after {
  content: '';
  position: absolute;
  right: -6px; top: 50%;
  transform: translateY(-50%);
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--text);
  opacity: 0;
  transition: opacity 0.15s;
}

.np-progress-bar:hover .np-progress-fill::after { opacity: 1; }
.np-progress-bar:hover .np-progress-fill { background: var(--green); }

.np-times {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 600;
}

/* CONTROLS */
.np-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
}

.np-ctrl-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  padding: 8px;
  display: flex;
  transition: color 0.15s, transform 0.1s;
}

.np-ctrl-btn:hover { color: var(--text); transform: scale(1.1); }

.np-play-btn {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--text);
  border: none;
  color: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.15s, background 0.15s;
  flex-shrink: 0;
}

.np-play-btn:hover { transform: scale(1.06); background: #e8e8e8; }
.np-play-btn:active { transform: scale(0.95); }

/* LYRICS IN NOW PLAYING */
.np-lyrics-section {
  margin-top: 8px;
  flex: 1;
  overflow: hidden;
  position: relative;
}

.np-lyrics-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 16px;
}

.np-lyrics-scroll {
  max-height: 160px;
  overflow-y: auto;
  scrollbar-width: none;
  -webkit-mask: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
  mask: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
}

.np-lyrics-scroll::-webkit-scrollbar { display: none; }

.lyric-line {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-muted);
  padding: 8px 0;
  transition: color 0.3s, transform 0.3s;
  line-height: 1.4;
  cursor: pointer;
}

.lyric-line.active {
  color: var(--text);
  transform: scale(1.03);
  transform-origin: left;
}

.no-lyrics {
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
  padding: 20px 0;
}

/* CARD PAGES (songs list, artist list) */
.card-page {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 150;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
}

.card-page.open {
  display: flex;
  transform: translateX(0);
}

.card-page-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 56px 16px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}

.card-back-btn {
  background: none;
  border: none;
  color: var(--text);
  cursor: pointer;
  padding: 8px;
  display: flex;
  transition: transform 0.15s;
}

.card-back-btn:hover { transform: scale(1.1); }

.card-page-title {
  font-size: 20px;
  font-weight: 700;
}

.card-page-search {
  padding: 12px 16px;
  flex-shrink: 0;
}

.card-search-input {
  width: 100%;
  padding: 10px 16px;
  border-radius: 6px;
  border: none;
  background: var(--surface3);
  color: var(--text);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
}

.card-search-input::placeholder { color: var(--text-muted); }

.card-page-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--surface4) transparent;
  padding-bottom: 16px;
}

/* ARTIST GRID IN CARD PAGE */
.artist-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
  padding: 16px;
}

.artist-grid-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: transform 0.15s;
}

.artist-grid-item:hover { transform: scale(1.05); }

.artist-grid-img {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 50%;
  object-fit: cover;
}

.artist-grid-name {
  font-size: 12px;
  font-weight: 600;
  text-align: center;
  line-height: 1.3;
  color: var(--text);
}

/* EMPTY */
.empty-state {
  text-align: center;
  padding: 80px 32px;
  color: var(--text-muted);
}

.empty-icon { font-size: 64px; margin-bottom: 20px; display: block; opacity: 0.5; }
.empty-title { font-size: 22px; font-weight: 700; color: var(--text-dim); margin-bottom: 10px; }
.empty-text { font-size: 14px; line-height: 1.6; }

/* HIDDEN AUDIO */
audio { display: none; }

/* EQUALIZER ANIMATION */
@keyframes eq1 { 0%,100%{height:4px} 50%{height:16px} }
@keyframes eq2 { 0%,100%{height:12px} 50%{height:4px} }
@keyframes eq3 { 0%,100%{height:8px} 50%{height:20px} }

.eq-bars {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 20px;
}

.eq-bar {
  width: 3px;
  background: var(--green);
  border-radius: 2px;
  animation-duration: 0.8s;
  animation-iteration-count: infinite;
}

.eq-bar:nth-child(1) { animation-name: eq1; }
.eq-bar:nth-child(2) { animation-name: eq2; animation-delay: 0.1s; }
.eq-bar:nth-child(3) { animation-name: eq3; animation-delay: 0.2s; }

.eq-bars.paused .eq-bar { animation-play-state: paused; }
</style>
</head>
<body>

<div class="app">
  <!-- SCROLL AREA -->
  <div class="scroll-area" id="scrollArea">

    <!-- HOME PAGE -->
    <div id="homePage" class="page active">
      <div class="home-header">
        <div class="home-greeting">Selamat Malam 👋</div>
        <div class="home-sub">Apa yang ingin kamu dengarkan?</div>
      </div>

      <div class="section-title">Koleksi Cepat</div>
      <div class="quick-grid" id="quickGrid"></div>

      <div class="section-title" style="margin-top:24px;">Artis</div>
      <div class="artists-scroll" id="homeArtists"></div>

      <div class="section-title" style="margin-top:24px;">Semua Lagu</div>
      <div id="homeSongList"></div>
    </div>

    <!-- SEARCH PAGE -->
    <div id="searchPage" class="page">
      <div class="search-header">
        <h1>Cari</h1>
        <div class="search-input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Lagu, artis...">
        </div>
      </div>

      <div id="searchBrowse">
        <div class="browse-title">Jelajahi</div>
        <div class="browse-grid">
          <div class="browse-card songs" onclick="openSongsCard()">
            <div class="browse-card-label">Lagu</div>
            <div class="browse-card-icon">♪</div>
          </div>
          <div class="browse-card artists" onclick="openArtistsCard()">
            <div class="browse-card-label">Artis</div>
            <div class="browse-card-icon">◉</div>
          </div>
        </div>
      </div>

      <div id="searchResults" class="search-results" style="display:none;"></div>
    </div>

    <!-- COLLECTION PAGE -->
    <div id="collectionPage" class="page">

  player.addEventListener('ended', onSongEnd);
  player.addEventListener('loadedmetadata', updateDuration);

function updateGreeting() {
  const h = new Date().getHours();
  const g = h < 12 ? 'Selamat Pagi' : h < 17 ? 'Selamat Siang' : 'Selamat Malam';
  document.querySelector('.home-greeting').textContent = `${g} 👋`;
}

// ===== RENDER HELPERS =====
function createSongItem(song, index, opts = {}) {
  const { showNum = false, num, songList } = opts;
  const isFav = favorites.includes(song.title);
  const isNowPlaying = currentIndex === index && isPlaying;

  const div = document.createElement('div');
  div.className = 'song-item' + (currentIndex === index ? ' playing' : '');
  div.dataset.songIndex = index;

  div.innerHTML = `
    ${showNum ? `<div class="song-item-num">${isNowPlaying ? '<div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>' : (num || '')}</div>` : ''}
    <img class="song-item-cover" src="${song.cover}" alt="">
    <div class="song-item-info">
      <div class="song-item-title">${song.title}</div>
      <div class="song-item-artist">${song.artist}</div>
    </div>
    <button class="song-item-fav ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFav('${song.title}', this)">
      ${isFav ? '💚' : '🤍'}
    </button>
  `;

  div.onclick = (e) => {
    if (e.target.closest('.song-item-fav')) return;
    currentSongList = songList || songs;
    playSong(index);
  };

  return div;
}

// ===== HOME =====

  const grid = document.getElementById('quickGrid');
  grid.innerHTML = '';
  artists.forEach(artist => {
    const item = document.createElement('div');
    item.className = 'quick-item';
    item.innerHTML = `<img src="${artist.cover}" alt=""><div class="quick-item-name">${artist.name}</div>`;
    item.onclick = () => { openArtistsCard(); showArtistSongs(artist); };
    grid.appendChild(item);
  });
}

function renderHomeArtists() {
  const container = document.getElementById('homeArtists');
  container.innerHTML = '';

    chip.className = 'artist-chip';
    chip.innerHTML = `<img src="${artist.cover}" alt=""><div class="artist-chip-name">${artist.name}</div>`;
    chip.onclick = () => { openArtistsCard(); showArtistSongs(artist); };
    container.appendChild(chip);
  });
}

function renderHomeSongs() {
  const list = document.getElementById('homeSongList');
  list.innerHTML = '';
  songs.forEach((song, i) => {
    list.appendChild(createSongItem(song, i, { showNum: true, num: i + 1 }));
  });
}

// ===== SONGS CARD PAGE =====
function openSongsCard() {
  const page = document.getElementById('songsCardPage');
  page.style.display = 'flex';
  setTimeout(() => page.classList.add('open'), 10);
  renderSongsCard();
}

function closeSongsCard() {
  const page = document.getElementById('songsCardPage');
  page.classList.remove('open');
  setTimeout(() => { page.style.display = 'none'; }, 350);
}

function renderSongsCard(keyword = '') {
  const list = document.getElementById('songsCardList');
  list.innerHTML = '';
  const filtered = songs.filter(s =>
    s.title.toLowerCase().includes(keyword.toLowerCase()) ||
    s.artist.toLowerCase().includes(keyword.toLowerCase())
  );
  filtered.forEach((song, i) => {
    const idx = songs.indexOf(song);
    list.appendChild(createSongItem(song, idx, { showNum: true, num: i + 1 }));
  });
}

  page.style.display = 'flex';

  renderArtistsCard();

function closeArtistsCard() {

  const page = document.getElementById('artistsCardPage');

  setTimeout(() => { page.style.display = 'none'; }, 350);

function renderArtistsCard(keyword = '') {
  const list = document.getElementById('artistsCardList');
  list.innerHTML = '';
  const filtered = artists.filter(a => a.name.toLowerCase().includes(keyword.toLowerCase()));
  const grid = document.createElement('div');
  grid.className = 'artist-grid';
  filtered.forEach(artist => {
    const item = document.createElement('div');
    item.className = 'artist-grid-item';
    item.innerHTML = `<img class="artist-grid-img" src="${artist.cover}" alt=""><div class="artist-grid-name">${artist.name}</div>`;
    item.onclick = () => showArtistSongs(artist);
    grid.appendChild(item);
  });
  list.appendChild(grid);
}

function showArtistSongs(artist) {
  artistsViewMode = 'songs';
  artistsViewArtist = artist;
  document.getElementById('artistsCardTitle').textContent = artist.name;
  document.getElementById('artistsCardSearch').placeholder = 'Cari lagu...';
  document.getElementById('artistsCardSearch').value = '';

    artistsViewMode = 'list';
    artistsViewArtist = null;
    document.getElementById('artistsCardTitle').textContent = 'Semua Artis';
    document.getElementById('artistsCardSearch').placeholder = 'Cari artis...';
    document.getElementById('artistsCardSearch').value = '';
    document.getElementById('artistsBackBtn').onclick = closeArtistsCard;
    renderArtistsCard();
  };
  renderArtistSongsInCard(artist);

  // Ensure artists card is open
  const page = document.getElementById('artistsCardPage');
  if (!page.classList.contains('open')) {
    page.style.display = 'flex';
    setTimeout(() => page.classList.add('open'), 10);
  }
}

    s.artist === artist.name &&
    s.title.toLowerCase().includes(keyword.toLowerCase())
  );
  artistSongs.forEach((song, i) => {
    const idx = songs.indexOf(song);
    list.appendChild(createSongItem(song, idx, { showNum: true, num: i + 1, songList: artistSongs.map(s => songs.indexOf(s)).map(i => songs[i]) }));
  });
}

// ===== SEARCH =====
function handleSearch(keyword) {
  const browse = document.getElementById('searchBrowse');
  const results = document.getElementById('searchResults');

  if (!keyword.trim()) {
    browse.style.display = 'block';
    results.style.display = 'none';
    return;
  }

  browse.style.display = 'none';
  results.style.display = 'block';
  results.innerHTML = '';

  const kw = keyword.toLowerCase();
  const filteredSongs = songs.filter(s => s.title.toLowerCase().includes(kw) || s.artist.toLowerCase().includes(kw));
  const filteredArtists = artists.filter(a => a.name.toLowerCase().includes(kw));

  if (filteredSongs.length) {
    const sec = document.createElement('div');
    sec.className = 'results-section';
    sec.innerHTML = '<div class="results-title">Lagu</div>';
    filteredSongs.forEach(song => {
      const idx = songs.indexOf(song);
      sec.appendChild(createSongItem(song, idx));
    });
    results.appendChild(sec);
  }

  if (filteredArtists.length) {
    const sec = document.createElement('div');
    sec.className = 'results-section';
    sec.innerHTML = '<div class="results-title">Artis</div>';
    const grid = document.createElement('div');
    grid.className = 'artist-grid';
    filteredArtists.forEach(artist => {
      const item = document.createElement('div');
      item.className = 'artist-grid-item';
      item.innerHTML = `<img class="artist-grid-img" src="${artist.cover}" alt=""><div class="artist-grid-name">${artist.name}</div>`;
      item.onclick = () => { openArtistsCard(); showArtistSongs(artist); };
      grid.appendChild(item);
    });
    sec.appendChild(grid);
    results.appendChild(sec);
  }

  if (!filteredSongs.length && !filteredArtists.length) {
    results.innerHTML = `<div class="empty-state"><span class="empty-icon">🔍</span><div class="empty-title">Tidak ditemukan</div><div class="empty-text">Coba kata kunci lain</div></div>`;
  }
}

// ===== COLLECTION =====
function filterCollection(type, btn) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderCollection(type);
}

function renderCollection(type) {
  const list = document.getElementById('collectionList');
  list.innerHTML = '';
  const filtered = type === 'fav' ? songs.filter(s => favorites.includes(s.title)) : songs;

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><span class="empty-icon">💚</span><div class="empty-title">Belum ada favorit</div><div class="empty-text">Tekan ikon 🤍 untuk menambah favorit</div></div>`;
    return;
  }

  filtered.forEach((song, i) => {
    const idx = songs.indexOf(song);
    list.appendChild(createSongItem(song, idx, { showNum: true, num: i + 1 }));
  });
}

// ===== FAVORITES =====
function toggleFav(title, btn) {
  if (favorites.includes(title)) {
    favorites = favorites.filter(f => f !== title);
    btn.textContent = '🤍';
    btn.classList.remove('active');
  } else {
    favorites.push(title);
    btn.textContent = '💚';
    btn.classList.add('active');
  }
  localStorage.setItem('yrm_favs', JSON.stringify(favorites));
  updateNpFavBtn();
}

function toggleFavFromPlayer() {
  if (currentIndex < 0) return;
  const song = songs[currentIndex];
  const isFav = favorites.includes(song.title);
  if (isFav) {
    favorites = favorites.filter(f => f !== song.title);
  } else {
    favorites.push(song.title);
  }
  localStorage.setItem('yrm_favs', JSON.stringify(favorites));
  updateNpFavBtn();
  refreshAllFavBtns();
}

function updateNpFavBtn() {
  if (currentIndex < 0) return;
  const btn = document.getElementById('npFavBtn');
  btn.textContent = favorites.includes(songs[currentIndex].title) ? '💚' : '🤍';
}

function refreshAllFavBtns() {
  document.querySelectorAll('.song-item-fav').forEach(btn => {
    const item = btn.closest('.song-item');
    const idx = parseInt(item.dataset.songIndex);
    if (isNaN(idx)) return;
    const song = songs[idx];
    if (!song) return;
    const isFav = favorites.includes(song.title);
    btn.textContent = isFav ? '💚' : '🤍';
    btn.classList.toggle('active', isFav);
  });
}

// ===== PLAYER =====
function playSong(index) {
  currentIndex = index;
  const song = songs[index];

  player.src = song.file;
  player.play().catch(() => {});
  isPlaying = true;

  updateNowPlayingUI(song);
  updateMiniPlayer(song);
  updatePlayBtns();
  updateActiveItems();

  document.getElementById('miniPlayer').classList.add('visible');
}

function updateNowPlayingUI(song) {
  document.getElementById('npCover').src = song.cover;
  document.getElementById('npTitle').textContent = song.title;
  document.getElementById('npArtist').textContent = song.artist;
  document.getElementById('npContext').textContent = song.artist.toUpperCase();

  const bgBlur = document.getElementById('npBgBlur');
  bgBlur.style.backgroundImage = `url(${song.cover})`;

  document.getElementById('npCover').className = 'np-cover playing';
  updateNpFavBtn();

  // Lyrics
  const lyricsEl = document.getElementById('npLyrics');
  lyricsEl.innerHTML = '';
  lyricEls = [];
  currentLyrics = song.lyrics || [];

  if (currentLyrics.length) {
    currentLyrics.forEach(l => {
      const el = document.createElement('div');
      el.className = 'lyric-line';
      el.textContent = l.text;
      el.onclick = () => { player.currentTime = l.time; };
      lyricsEl.appendChild(el);
      lyricEls.push(el);
    });
  } else {
    lyricsEl.innerHTML = '<div class="no-lyrics">Lirik belum tersedia</div>';
  }
}

function updateMiniPlayer(song) {
  document.getElementById('miniCover').src = song.cover;
  document.getElementById('miniTitle').textContent = song.title;
  document.getElementById('miniArtist').textContent = song.artist;
}

function updatePlayBtns() {
  const icons = {
    play: `<path d="M8 5v14l11-7z"/>`,
    pause: `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`
  };
  const icon = isPlaying ? icons.pause : icons.play;

  document.getElementById('miniPlayIcon').innerHTML = icon;
  document.getElementById('npPlayIcon').innerHTML = icon;

  const npCover = document.getElementById('npCover');
  npCover.className = 'np-cover ' + (isPlaying ? 'playing' : 'paused');
}

function updateActiveItems() {
  document.querySelectorAll('.song-item').forEach(el => {
    const idx = parseInt(el.dataset.songIndex);
    el.classList.toggle('playing', idx === currentIndex);
  });
}

function togglePlay() {
  if (currentIndex < 0) return;
  if (isPlaying) {
    player.pause();
    isPlaying = false;
  } else {
    player.play().catch(() => {});
    isPlaying = true;
  }
  updatePlayBtns();
}

function nextSong() {
  if (currentIndex < 0) return;
  let next;
  if (shuffle) {
    next = Math.floor(Math.random() * songs.length);
  } else {
    next = (currentIndex + 1) % songs.length;
  }
  playSong(next);
}

function prevSong() {
  if (currentIndex < 0) return;
  if (player.currentTime > 3) {
    player.currentTime = 0;
    return;
  }
  const prev = (currentIndex - 1 + songs.length) % songs.length;
  playSong(prev);
}

function onSongEnd() {
  if (repeat) {
    player.currentTime = 0;
    player.play().catch(() => {});
  } else {
    nextSong();
  }
}

function toggleShuffle() {
  shuffle = !shuffle;
  const btn = document.getElementById('shuffleBtn');
  btn.style.color = shuffle ? 'var(--green)' : 'var(--text-dim)';
}

function toggleRepeat() {
  repeat = !repeat;
  const btn = document.getElementById('repeatBtn');
  btn.style.color = repeat ? 'var(--green)' : 'var(--text-dim)';
}

// ===== TIME UPDATE =====
function onTimeUpdate() {
  if (!player.duration) return;
  const pct = (player.currentTime / player.duration) * 100;

  document.getElementById('npProgressFill').style.width = pct + '%';
  document.getElementById('miniProgress').style.width = pct + '%';

  document.getElementById('npCurrent').textContent = formatTime(player.currentTime);

  // Lyrics sync
  if (!currentLyrics.length) return;
  let active = -1;
  for (let i = 0; i < currentLyrics.length; i++) {
    if (player.currentTime >= currentLyrics[i].time) active = i;
    else break;
  }

  lyricEls.forEach((el, i) => {
    if (i === active) {
      el.classList.add('active');
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else {
      el.classList.remove('active');
    }
  });
}

function updateDuration() {
  document.getElementById('npDuration').textContent = formatTime(player.duration);
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// ===== NAVIGATION =====
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page + 'Page').classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(page + 'NavBtn').classList.add('active');
  document.getElementById('scrollArea').scrollTo({ top: 0 });

  if (page === 'collection') renderCollection('all');
}

function openNowPlaying() {
  document.getElementById('nowPlayingScreen').classList.add('open');
  npOpen = true;
}

function closeNowPlaying() {
  document.getElementById('nowPlayingScreen').classList.remove('open');
  npOpen = false;
}

// ===== START =====
init();
</script>
</body>
</html>
